<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NP-Monkey Inference Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h2>The Stochastic Typewriter (NP-Search)</h2>
        <div class="controls">
            <label>Target Text:</label>
            <input type="text" id="target" value="IN THE BEGINNING" maxlength="50" oninput="this.value = this.value.toUpperCase()">
            
            <label>Monkeys (Threads):</label>
            <input type="number" id="monkeyCount" value="10000" min="10" max="50000">
            
            <button id="toggleBtn" onclick="togglePause()">Pause Universe</button>
            <button id="resetBtn" onclick="resetUniverse()" style="background: #ff3333; color: white;">Hard Reset</button>
            
            <a href="zeno.html" style="color:#0a0; margin-left:20px;">[View Zeno Gravity Engine]</a>
        </div>

    <div class="stage">
        <div class="panel" id="leaderboard">
            <h3>Top 10 Monkeys (Lowest Hamming Distance)</h3>
            <ul id="rankings"></ul>
        </div>
    </div>
    <script src="monkey-engine.js"></script>
</body>
</html>
